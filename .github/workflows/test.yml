name: test

on: 
  push:
    branches:
      - main
      - dev
      - feats/add_codecov
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:
  workflow_call:

jobs:
  build:
  
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 12
      matrix:
        os: [ubuntu-latest] #, ubuntu-latest, windows-latest
        python-version: ["3.9"] #, "3.10", "3.11"] #"3.7", "3.8", "3.10", , "3.11"
        
    steps:
    - name: Checkout Repository 
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Setup Conda for Ubuntu and Mac
      if: matrix.os != 'windows-latest'
      run: |
        #$CONDA is an environment variable pointing to the root of the miniconda directory
        echo $CONDA/bin >> $GITHUB_PATH
        
    - name: Setup Conda for Windows
      if: matrix.os == 'windows-latest'
      uses: s-weigand/setup-conda@v1
      with:
        update-conda: true
        python-version: ${{ matrix.python-version }}
        conda-channels: anaconda, bioconda, conda-forge
        
    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v2
      with:
        auto-update-conda: true
        python-version: ${{ matrix.python-version }}
        channels: 'bioconda,conda-forge'
        channel-priority: strict
        activate-environment: oligo_env
        
    - name: Conda Configs
      run: |
        python --version
        conda --version
        conda config --show channels
        
    - name: Install conda dependencies  
      run: |  
        # conda install "blast>=2.12"
        # conda install "bedtools>=2.30"
        # conda install "bowtie2>=2.5"
        # conda install "bowtie>=1.3.1"
        
    - name: Install pip dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install coverage
        pip install -e .
    
    - name: Test with pytest
      run: |
        coverage run -m pytest
        coverage xml -i
      env:
        PLATFORM: ${{ matrix.os }}
      
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4.0.1
      with:
        files: oligo_designer_toolsuite/coverage.xml
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
