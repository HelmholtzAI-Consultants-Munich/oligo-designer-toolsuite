name: Install BLAST on Windows

on:
  push:
    branches:
      - test-windows
  pull_request:
    branches:
      - test-windows

jobs:
  install-blast:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download BLAST+
        run: |
          Invoke-WebRequest -Uri "https://ftp.ncbi.nlm.nih.gov/blast/executables/blast+/2.16.0/ncbi-blast-2.16.0+-win64.exe" -OutFile "blast_installer.exe"

      - name: Install BLAST+
        run: |
          Start-Process -FilePath "blast_installer.exe" -ArgumentList "/S /D=C:\\blast" -NoNewWindow -Wait

      - name: List Installed Files
        run: |
          Get-ChildItem -Path C:\\blast -Recurse

      - name: Add BLAST to PATH
        run: |
          echo "C:\\blast\\bin" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Verify Installation
        run: |
          Get-Command "C:\\blast\\bin\\blastn.exe"
          C:\\blast\\bin\\blastn.exe -version
