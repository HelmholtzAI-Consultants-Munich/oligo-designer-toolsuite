name: Install BLAST on Windows

on:
  push:
    branches:
      - test-windows
  pull_request:
    branches:
      - test-windows

jobs:
  install-blast:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download BLAST+
        run: |
          Invoke-WebRequest -Uri "https://ftp.ncbi.nlm.nih.gov/blast/executables/blast+/2.16.0/ncbi-blast-2.16.0+-win64.exe" -OutFile "blast_installer.exe"
          Get-ChildItem


      - name: Install BLAST+
        run: |
          Start-Process -FilePath "blast_installer.exe" -ArgumentList "/D=C:\\blast" -NoNewWindow -Wait
          Get-ChildItem "C:\\"

      - name: Find BLAST Executable (Optimized)
        id: find-blast
        run: |
          $commonPaths = @("C:\\blast\\bin", "C:\\blast")
          $blastPath = $null
          foreach ($path in $commonPaths) {
            if (Test-Path "$path\\blastn.exe") {
              $blastPath = "$path\\blastn.exe"
              break
            }
          }
          if (-Not $blastPath) {
            throw "BLAST+ installation failed or incorrect path."
          }
          echo "BLAST_PATH=$blastPath" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Add BLAST to PATH
        run: |
          $blastDir = (Get-Item $env:BLAST_PATH).DirectoryName
          echo "$blastDir" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Verify Installation
        run: |
          echo "Using BLAST from: $env:BLAST_PATH"
          & $env:BLAST_PATH -version
