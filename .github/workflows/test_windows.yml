name: Install BLAST on Windows

on:
  push:
    branches:
      - test-windows
  pull_request:
    branches:
      - test-windows

jobs:
  install-blast:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download BLAST+
        run: |
          Invoke-WebRequest -Uri "https://ftp.ncbi.nlm.nih.gov/blast/executables/blast+/2.16.0/ncbi-blast-2.16.0+-win64.exe" -OutFile "blast_installer.exe"

      - name: Run Installer with Logging
        run: |
          Start-Process -FilePath "blast_installer.exe" -ArgumentList "/S /D=C:\\blast" -RedirectStandardOutput "blast_install.log" -RedirectStandardError "blast_error.log" -NoNewWindow -Wait

      - name: Check Installation Logs
        run: |
          if (Test-Path "blast_install.log") { Get-Content "blast_install.log" }
          if (Test-Path "blast_error.log") { Get-Content "blast_error.log" }

      - name: Find Installed Files
        run: |
          Get-ChildItem -Path C:\\blast -Recurse

      - name: Locate BLAST Executable
        id: find-blast
        run: |
          $blastPath = Get-ChildItem -Path "C:\\blast" -Recurse -Filter "blastn.exe" | Select-Object -ExpandProperty FullName -First 1
          if (-Not $blastPath) { throw "BLAST+ installation failed or incorrect path." }
          echo "BLAST_PATH=$blastPath" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Add BLAST to PATH
        run: |
          $blastDir = (Get-Item $env:BLAST_PATH).DirectoryName
          echo "$blastDir" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Verify Installation
        run: |
          echo "Using BLAST from: $env:BLAST_PATH"
          & $env:BLAST_PATH -version
